services:
  # redis:
  #   image: redis:alpine
  #   container_name: nowlii-redis
  #   ports:
  #     - "6379:6379"
  #   restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: fahad1000mir/nowlii-backend:dev
    container_name: nowlii-backend
    ports:
      - "8001:8001"
    volumes:
      - .:/app
      - venv_volume:/app/.venv
    env_file:
      - .env
    environment:
      - DEBUG=True
      - DB_HOST=
    #   - REDIS_HOST=redis
    # depends_on:
    #   - redis
    command: python manage.py runserver 0.0.0.0:8001
    restart: always

volumes:
  venv_volume:
