services:
  db:
    image: postgres:16-alpine
    container_name: nowlii-db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    restart: always

  # redis:
  #   image: redis:alpine
  #   container_name: nowlii-redis
  #   restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: fahad1000mir/nowlii-backend:dev
    container_name: nowlii-backend
    ports:
      - "8001:8001"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    environment:
      - DEBUG=False
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - db
    #   - redis
    restart: always

volumes:
  postgres_data:
  static_volume:
  media_volume:
